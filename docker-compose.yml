version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: inventory_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: safe_dev_password123
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: inventory_fastapi_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:safe_dev_password123@db:5432/inventory
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: inventory_react_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: